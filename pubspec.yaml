name: app
description: "Opinionated Flutter template with strict 3-layer architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: any

  # State / DI / routing
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  go_router: ^17.3.0
  get_it: ^9.2.1

  # Data
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.3.1

  # Utilities
  equatable: ^2.0.5
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/env/dev.json
    - assets/env/staging.json
    - assets/env/prod.json
