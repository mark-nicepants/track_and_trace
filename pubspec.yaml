name: app
description: "Opinionated Flutter template with strict 3-layer architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: any

  # State / DI / routing
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  go_router: ^17.3.0
  get_it: ^9.2.1

  # Data
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.3.1
  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.5

  # Platform / device
  tracelet: ^1.2.0
  permission_handler: ^12.0.0
  connectivity_plus: ^6.1.0
  wakelock_plus: ^1.2.8
  flutter_foreground_task: ^9.1.0
  package_info_plus: ^8.1.1

  # Utilities
  equatable: ^2.0.5
  logger: ^2.4.0
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1
  sqflite_common_ffi: ^2.3.0
  fake_async: ^1.3.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/env/dev.json
    - assets/env/staging.json
    - assets/env/prod.json

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/ic_launcher.png"
  min_sdk_android: 26
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icon/ic_launcher_foreground.png"
